<body>

    <div id="google_translate_element"></div>

    <header>
        <div class="header-content">
            <div class="logo-wrapper">
                <svg width="80" height="80" viewBox="0 0 100 100" class="svg-logo">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="2" fill="none" />
                    <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5" />

                    <ellipse cx="50" cy="50" rx="35" ry="20" stroke="currentColor" stroke-width="1" fill="none" />
                    <circle cx="50" cy="50" r="3" fill="currentColor" />

            </div>

            <div class="header-text">
                <h1>GUNPEDIA.WEB</h1>
                <p class="sub-header">WIKI DE MODELOS DE PRODUCCIÓN // REF: 2026-INTEL</p>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchBar" placeholder="BUSCAR DESIGNACIÓN...">
            <button id="sortBtn" class="sort-btn" onclick="toggleSortOrder()">ORDEN: A-Z ↑</button>
            <button class="reset-btn" onclick="resetFilters()">RESETEAR SISTEMA</button>
            <button class="reset-btn" id="cleanerBtn">SCAN</button>
        </div>

    <main>
        <div class="filter-panel">
            <div class="filter-group">
                <span class="filter-label">CATEGORÍAS:</span>
                <div id="cat-filters" class="button-row"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">PROCEDENCIA:</span>
                <div id="origin-filters" class="button-row"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">CONFLICTOS:</span>
                <div id="wars-filters" class="button-row"></div>
            </div>
        </div>
        </div>

        <div id="wiki-container">
            </div>
    </main>

    <div id="weaponModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
